<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Salary Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand">

            Salary Prediction

        </a>

        <div>

            <a href="/dashboard"
               class="btn btn-light">

                Dashboard

            </a>

            <a href="/history"
               class="btn btn-primary">

                View Previous Predictions

            </a>

            <a href="/logout"
               class="btn btn-danger">

                Logout

            </a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-success text-white">

            <h3>

                Predict Employee Salary

            </h3>

        </div>

        <div class="card-body">

            <form method="POST" action="/predict_salary">

                <div class="row">

                    <div class="col-md-4 mb-3">

                        <label>

                            Experience

                        </label>

                        <input
                            type="number"
                            name="experience"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label>

                            Age

                        </label>

                        <input
                            type="number"
                            name="age"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label>

                            Skill Score

                        </label>

                        <input
                            type="number"
                            name="skill_score"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label>

                            Education

                        </label>

                        <select
                            name="education"
                            class="form-select">

                            <option>Bachelors</option>

                            <option>Masters</option>

                            <option>PhD</option>

                        </select>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label>

                            City

                        </label>

                        <select
                            name="city"
                            class="form-select">

                            <option>Ahmedabad</option>

                            <option>Bangalore</option>

                            <option>Chennai</option>

                            <option>Delhi</option>

                            <option>Hyderabad</option>

                            <option>Mumbai</option>

                            <option>Pune</option>

                            <option>Surat</option>

                        </select>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label>

                            Department

                        </label>

                        <select
                            name="department"
                            class="form-select">

                            <option>IT</option>

                            <option>HR</option>

                            <option>Finance</option>

                            <option>Sales</option>

                            <option>Marketing</option>

                            <option>Operations</option>

                            <option>Data Science</option>

                        </select>

                    </div>

                </div>

                <button
                    type="submit"
                    class="btn btn-success">

                    Predict Salary

                </button>

            </form>

            {% if salary %}

            <div class="alert alert-success mt-4">

                <h4>

                    Predicted Salary

                </h4>

                <h2>

                    ₹ {{ salary }}

                </h2>

            </div>

            {% endif %}

        </div>

    </div>

</div>

</body>

</html>
